name: Supply Chain Security

on:
  push:
    branches:
      - master
    paths:
      - composer.json
      - .github/dependabot.yml
      - .github/workflows/supply-chain-security.yml
  pull_request:
    branches:
      - master
    paths:
      - composer.json
      - .github/dependabot.yml
      - .github/workflows/supply-chain-security.yml
  schedule:
    - cron: '23 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  composer-supply-chain:
    name: Composer audit, licenses and SBOM
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer downloads
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-supply-chain-composer-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-supply-chain-composer-

      - name: Prepare report directory
        run: |
          mkdir -p build/supply-chain

      - name: Resolve Composer dependencies for this CI run
        run: |
          composer config -g github-oauth.github.com "${{ secrets.GITHUB_TOKEN }}"
          composer update --no-interaction --prefer-dist

      - name: Run Composer audit
        id: composer-audit
        shell: bash
        run: |
          set +e
          composer audit --no-interaction --format=json > build/supply-chain/composer-audit.json
          audit_json_exit=$?
          composer audit --no-interaction --format=summary > build/supply-chain/composer-audit.txt
          audit_summary_exit=$?
          set -e
          audit_exit=$audit_json_exit
          if [ "$audit_summary_exit" -gt "$audit_exit" ]; then
            audit_exit=$audit_summary_exit
          fi
          echo "exit_code=$audit_exit" >> "$GITHUB_OUTPUT"

      - name: Generate Composer license report
        run: |
          composer licenses --no-interaction --format=json > build/supply-chain/composer-licenses.json
          composer licenses --no-interaction --format=summary > build/supply-chain/composer-licenses.txt

      - name: Export GitHub dependency graph SBOM
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/dependency-graph/sbom" \
            -o build/supply-chain/github-dependency-graph.spdx.json

      - name: Upload supply chain reports
        uses: actions/upload-artifact@v7
        with:
          name: supply-chain-reports
          path: build/supply-chain
          if-no-files-found: error

      - name: Fail on vulnerable Composer dependencies
        if: steps.composer-audit.outputs.exit_code != '0'
        run: |
          echo "Composer audit reported vulnerable dependencies. See the uploaded supply-chain-reports artifact for details."
          exit 1
