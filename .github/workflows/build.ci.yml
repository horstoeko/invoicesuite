name: Continuous Integration

on:
  push:
    tags-ignore:
      - "**"
    branches:
      - "**"
    paths-ignore:
      - "**.md"
      - ".github/**"
      - "examples/**"
      - "make/**"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - "master"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VALIDATORURL: https://github.com/itplr-kosit/validator/releases/download/v1.6.0/validator-1.6.0.zip
  VALIDATORSCENARIOURL: https://github.com/itplr-kosit/validator-configuration-xrechnung/releases/download/release-2025-07-10/validator-configuration-xrechnung_3.0.2_2025-07-10.zip
  VALIDATORPATH: build/validator
  VALIDATORZIPFILENAME: validator.zip
  VALIDATORSCENARIOZIPFILENAME: validator-configuration.zip
  VALIDATORJARFILENAME: validator-1.6.0-standalone.jar
  VALIDATORSCENARIOFILENAME: scenarios.xml
  PHPDOCUMENTORURL: https://phpdoc.org/phpDocumentor.phar
  PHPDOCUMENTORFILENAME: phpDocumentor.phar
  VERAPDFURL: https://software.verapdf.org/rel/verapdf-installer.zip
  VERAPDFPATH: build/verapdf
  VERAPDFZIPFILENAME: verapdf.zip
  GH_PAT: ${{ secrets.UPDATEWIKITOKEN }}

jobs:
  build:
    permissions:
      contents: read
      checks: write
      pull-requests: write
    runs-on: ${{ matrix.operating-system }}
    strategy:
      fail-fast: false
      matrix:
        operating-system: ["ubuntu-24.04"]
        phpversion: ["8.2", "8.3", "8.4", "8.5"]

    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup PHP with PECL extension
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.phpversion }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, bcmath, intl, gd, exif, iconv, imagick, json, xdebug
          coverage: xdebug

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: "11"
          distribution: "temurin"

      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-${{ matrix.phpversion }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.phpversion }}-composer-${{ hashFiles('**/composer.json') }}
            ${{ runner.os }}-${{ matrix.phpversion }}-composer-

      - name: Install composer dependencies
        run: |
          composer config -g github-oauth.github.com ${{ secrets.GITHUB_TOKEN }}
          composer update --no-interaction --prefer-dist --no-progress

      - name: Prepare Directories
        run: |
          mkdir build/builddoc
          mkdir build/doc
          mkdir build/coverage
          mkdir build/coverage-html
          mkdir build/logs
          mkdir build/dist
          mkdir build/phpdoc
          mkdir build/phpstan

      - name: Run Lint
        run: |
          vendor/bin/parallel-lint src tests

      - name: Cache Key (PHP-CS-Fixer)
        id: hash-php-cs-fixer
        run: |
          echo "hash=$(sha256sum build/phpcsfixer.php | cut -c1-16)" >> $GITHUB_OUTPUT

      - name: Cache PHP-CS-Fixer
        uses: actions/cache@v5
        with:
          path: build/.php-cs-fixer.cache
          key: ${{ runner.os }}-${{ matrix.phpversion }}-php-cs-fixer-${{ steps.hash-php-cs-fixer.outputs.hash }}

      - name: Cache Key (PHPStan)
        id: hash-phpstan
        run: |
          echo "hash=$(sha256sum build/phpstan.neon | cut -c1-16)" >> $GITHUB_OUTPUT

      - name: Cache PHPStan
        uses: actions/cache@v5
        with:
          path: build/phpstan
          key: ${{ runner.os }}-${{ matrix.phpversion }}-phpstan-${{ steps.hash-phpstan.outputs.hash }}

      - name: Run PHP-CS-Fixer (dry-run)
        env:
          XDEBUG_MODE: off
        run: |
          vendor/bin/php-cs-fixer fix --config=build/phpcsfixer.php --dry-run --no-interaction

      - name: Run PHPStan
        run: |
          php -d sys_temp_dir=$(pwd)/build/phpstan vendor/bin/phpstan analyze -c build/phpstan.neon --autoload-file=vendor/autoload.php --no-interaction --memory-limit 4G --error-format=github

      - name: Run Tests (PHPUnit)
        run: |
          vendor/bin/phpunit --stop-on-failure --configuration build/phpunit.xml
        env:
          XDEBUG_MODE: coverage

      - name: Publish Coverage Summary
        if: always()
        run: |
          summary_file="$GITHUB_STEP_SUMMARY"
          clover_file="build/logs/clover.xml"
          crap4j_file="build/logs/crap4j.xml"

          {
            echo "## Coverage Summary"
            echo
          } >> "$summary_file"

          if [ ! -f "$clover_file" ]; then
            echo "No Clover coverage report found at $clover_file." >> "$summary_file"
            exit 0
          fi

          php /dev/stdin "$clover_file" "$crap4j_file" >> "$summary_file" <<'PHP'
          <?php
          $cloverFile = $argv[1];
          $crap4jFile = $argv[2];

          $loadXml = static function (string $file): ?DOMDocument {
              $dom = new DOMDocument();
              libxml_use_internal_errors(true);

              if (!is_file($file) || !$dom->load($file)) {
                  return null;
              }

              return $dom;
          };

          $formatPercent = static function (int $covered, int $total): string {
              if ($total === 0) {
                  return 'n/a';
              }

              return number_format(($covered / $total) * 100, 2, '.', '') . '%';
          };

          $formatPercentValue = static function (float $value): string {
              return number_format($value, 2, '.', '') . '%';
          };

          $normalizePath = static function (string $path): string {
              return str_replace('\\', '/', $path);
          };

          $toRelativePath = static function (string $path) use ($normalizePath): string {
              $path = $normalizePath($path);

              $marker = '/src/';
              $position = strpos($path, $marker);

              if ($position !== false) {
                  return substr($path, $position + 1);
              }

              if (str_starts_with($path, 'src/')) {
                  return $path;
              }

              return ltrim($path, '/');
          };

          $resolvePackage = static function (string $path) use ($toRelativePath): string {
              $path = $toRelativePath($path);

              if (str_starts_with($path, 'src/')) {
                  $parts = explode('/', $path);

                  return count($parts) >= 2 ? $parts[0] . '/' . $parts[1] : 'src';
              }

              $directory = dirname($path);

              return $directory === '.' ? '(root)' : $directory;
          };

          $cloverDom = $loadXml($cloverFile);

          if (!$cloverDom instanceof DOMDocument) {
              echo "Coverage report found, but could not be parsed: {$cloverFile}.\n";
              exit(0);
          }

          $xpath = new DOMXPath($cloverDom);
          $metrics = $xpath->query('//project/metrics')->item(0);

          if (!$metrics instanceof DOMElement) {
              echo "Coverage report found, but does not contain project metrics: {$cloverFile}.\n";
              exit(0);
          }

          $getInt = static function (DOMElement $element, string $name): int {
              $value = $element->getAttribute($name);

              return $value === '' ? 0 : (int) $value;
          };

          $statements = $getInt($metrics, 'statements');
          $coveredStatements = $getInt($metrics, 'coveredstatements');
          $methods = $getInt($metrics, 'methods');
          $coveredMethods = $getInt($metrics, 'coveredmethods');
          $conditionals = $getInt($metrics, 'conditionals');
          $coveredConditionals = $getInt($metrics, 'coveredconditionals');
          $elements = $getInt($metrics, 'elements');
          $coveredElements = $getInt($metrics, 'coveredelements');
          $classes = $getInt($metrics, 'classes');
          $files = $getInt($metrics, 'files');
          $ncloc = $getInt($metrics, 'ncloc');

          echo "| Metric | Covered | Total | Coverage |\n";
          echo "| --- | ---: | ---: | ---: |\n";
          echo '| Statements | ' . $coveredStatements . ' | ' . $statements . ' | ' . $formatPercent($coveredStatements, $statements) . " |\n";
          echo '| Methods | ' . $coveredMethods . ' | ' . $methods . ' | ' . $formatPercent($coveredMethods, $methods) . " |\n";
          echo '| Conditionals | ' . $coveredConditionals . ' | ' . $conditionals . ' | ' . $formatPercent($coveredConditionals, $conditionals) . " |\n";
          echo '| Elements | ' . $coveredElements . ' | ' . $elements . ' | ' . $formatPercent($coveredElements, $elements) . " |\n\n";

          echo "### Coverage Distribution\n\n";

          $fileRows = [];
          $packageRows = [];
          $zeroCoverageFiles = 0;
          $below50Files = 0;
          $below70Files = 0;
          $below80Files = 0;
          $atLeast90Files = 0;

          foreach ($xpath->query('//file') as $fileNode) {
              if (!$fileNode instanceof DOMElement) {
                  continue;
              }

              $fileMetricsNode = null;

              foreach ($fileNode->childNodes as $childNode) {
                  if ($childNode instanceof DOMElement && $childNode->tagName === 'metrics') {
                      $fileMetricsNode = $childNode;
                      break;
                  }
              }

              if (!$fileMetricsNode instanceof DOMElement) {
                  continue;
              }

              $filePath = $toRelativePath($fileNode->getAttribute('name'));
              $fileStatements = $getInt($fileMetricsNode, 'statements');
              $fileCoveredStatements = $getInt($fileMetricsNode, 'coveredstatements');
              $fileMethods = $getInt($fileMetricsNode, 'methods');
              $fileCoveredMethods = $getInt($fileMetricsNode, 'coveredmethods');
              $fileConditionals = $getInt($fileMetricsNode, 'conditionals');
              $fileCoveredConditionals = $getInt($fileMetricsNode, 'coveredconditionals');

              if ($fileStatements === 0 && $fileMethods === 0 && $fileConditionals === 0) {
                  continue;
              }

              $uncoveredStatements = max(0, $fileStatements - $fileCoveredStatements);
              $coverageRatio = $fileStatements > 0 ? ($fileCoveredStatements / $fileStatements) * 100 : ($fileMethods > 0 ? ($fileCoveredMethods / $fileMethods) * 100 : 0.0);

              if ($fileStatements > 0 && $fileCoveredStatements === 0) {
                  $zeroCoverageFiles++;
              }

              if ($coverageRatio < 50.0) {
                  $below50Files++;
              }

              if ($coverageRatio < 70.0) {
                  $below70Files++;
              }

              if ($coverageRatio < 80.0) {
                  $below80Files++;
              }

              if ($coverageRatio >= 90.0) {
                  $atLeast90Files++;
              }

              $fileRows[] = [
                  'file' => $filePath,
                  'statements' => $fileStatements,
                  'coveredStatements' => $fileCoveredStatements,
                  'uncoveredStatements' => $uncoveredStatements,
                  'coverageRatio' => $coverageRatio,
              ];

              $package = $resolvePackage($filePath);

              if (!isset($packageRows[$package])) {
                  $packageRows[$package] = [
                      'package' => $package,
                      'files' => 0,
                      'statements' => 0,
                      'coveredStatements' => 0,
                      'uncoveredStatements' => 0,
                  ];
              }

              $packageRows[$package]['files']++;
              $packageRows[$package]['statements'] += $fileStatements;
              $packageRows[$package]['coveredStatements'] += $fileCoveredStatements;
              $packageRows[$package]['uncoveredStatements'] += $uncoveredStatements;
          }

          echo "| Files | Classes | NCLOC | 0% Files | < 50% | < 70% | < 80% | ≥ 90% |\n";
          echo "| ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: |\n";
          echo '| ' . $files . ' | ' . $classes . ' | ' . $ncloc . ' | ' . $zeroCoverageFiles . ' | ' . $below50Files . ' | ' . $below70Files . ' | ' . $below80Files . ' | ' . $atLeast90Files . " |\n\n";

          if ($fileRows !== []) {
              usort(
                  $fileRows,
                  static function (array $left, array $right): int {
                      return [$left['coverageRatio'], -$left['uncoveredStatements'], $left['file']]
                          <=> [$right['coverageRatio'], -$right['uncoveredStatements'], $right['file']];
                  }
              );

              echo "### Weakest Files by Statement Coverage\n\n";
              echo "| File | Uncovered | Statements | Coverage |\n";
              echo "| --- | ---: | ---: | ---: |\n";

              foreach (array_slice($fileRows, 0, 10) as $row) {
                  echo '| `' . $row['file'] . '` | ' . $row['uncoveredStatements'] . ' | ' . $row['statements'] . ' | ' . $formatPercentValue($row['coverageRatio']) . " |\n";
              }

              echo "\n";

              $largestGaps = $fileRows;
              usort(
                  $largestGaps,
                  static function (array $left, array $right): int {
                      return [$right['uncoveredStatements'], $left['coverageRatio'], $left['file']]
                          <=> [$left['uncoveredStatements'], $right['coverageRatio'], $right['file']];
                  }
              );

              echo "### Largest Uncovered Statement Gaps\n\n";
              echo "| File | Uncovered | Covered | Statements | Coverage |\n";
              echo "| --- | ---: | ---: | ---: | ---: |\n";

              foreach (array_slice($largestGaps, 0, 10) as $row) {
                  echo '| `' . $row['file'] . '` | ' . $row['uncoveredStatements'] . ' | ' . $row['coveredStatements'] . ' | ' . $row['statements'] . ' | ' . $formatPercentValue($row['coverageRatio']) . " |\n";
              }

              echo "\n";
          }

          if ($packageRows !== []) {
              $packageRows = array_values($packageRows);

              foreach ($packageRows as &$packageRow) {
                  $packageRow['coverageRatio'] = $packageRow['statements'] > 0
                      ? ($packageRow['coveredStatements'] / $packageRow['statements']) * 100
                      : 0.0;
              }
              unset($packageRow);

              usort(
                  $packageRows,
                  static function (array $left, array $right): int {
                      return [$left['coverageRatio'], -$left['uncoveredStatements'], $left['package']]
                          <=> [$right['coverageRatio'], -$right['uncoveredStatements'], $right['package']];
                  }
              );

              echo "### Package Overview\n\n";
              echo "| Package | Files | Uncovered | Statements | Coverage |\n";
              echo "| --- | ---: | ---: | ---: | ---: |\n";

              foreach ($packageRows as $row) {
                  echo '| `' . $row['package'] . '` | ' . $row['files'] . ' | ' . $row['uncoveredStatements'] . ' | ' . $row['statements'] . ' | ' . $formatPercentValue($row['coverageRatio']) . " |\n";
              }

              echo "\n";
          }

          echo "### CRAP Hotspots\n\n";

          $crapDom = $loadXml($crap4jFile);

          if (!$crapDom instanceof DOMDocument) {
              echo "No Crap4J report found at {$crap4jFile}.\n\n";
          } else {
              $crapXpath = new DOMXPath($crapDom);
              $crapRows = [];

              foreach ($crapXpath->query('//method') as $methodNode) {
                  if (!$methodNode instanceof DOMElement) {
                      continue;
                  }

                  $crap = $methodNode->getAttribute('crap');

                  if ($crap === '') {
                      continue;
                  }

                  $className = $methodNode->getAttribute('className');
                  if ($className === '') {
                      $className = $methodNode->getAttribute('class');
                  }

                  $methodName = $methodNode->getAttribute('method');
                  if ($methodName === '') {
                      $methodName = $methodNode->getAttribute('name');
                  }

                  $file = $toRelativePath($methodNode->getAttribute('file'));
                  $complexity = $methodNode->getAttribute('complexity');
                  $coverage = $methodNode->getAttribute('coverage');

                  $crapRows[] = [
                      'crap' => (float) $crap,
                      'className' => $className !== '' ? $className : '(unknown class)',
                      'methodName' => $methodName !== '' ? $methodName : '(unknown method)',
                      'file' => $file !== '' ? $file : '(unknown file)',
                      'complexity' => $complexity !== '' ? (int) $complexity : 0,
                      'coverage' => $coverage !== '' ? (float) $coverage : 0.0,
                  ];
              }

              if ($crapRows === []) {
                  echo "No CRAP hotspots found in {$crap4jFile}.\n\n";
              } else {
                  usort(
                      $crapRows,
                      static function (array $left, array $right): int {
                          return [$right['crap'], $right['complexity'], $left['className'], $left['methodName']]
                              <=> [$left['crap'], $left['complexity'], $right['className'], $right['methodName']];
                      }
                  );

                  echo "| Class::Method | File | CRAP | Complexity | Coverage |\n";
                  echo "| --- | --- | ---: | ---: | ---: |\n";

                  foreach (array_slice($crapRows, 0, 10) as $row) {
                      echo '| `' . $row['className'] . '::' . $row['methodName'] . '` | `' . $row['file'] . '` | ' . number_format($row['crap'], 2, '.', '') . ' | ' . $row['complexity'] . ' | ' . $formatPercentValue($row['coverage']) . " |\n";
                  }

                  echo "\n";
              }
          }

          echo "Coverage reports:\n";
          echo "- `build/logs/clover.xml`\n";
          echo "- `build/logs/crap4j.xml`\n";
          echo "- `build/coverage`\n";
          echo "- `build/coverage-html`\n";
          PHP

      - name: Cache Key (Schematron)
        id: hash-validator
        run: |
          echo "hash=$(echo '${{ env.VALIDATORURL }} ${{ env.VALIDATORSCENARIOURL }}' | sha256sum | cut -c1-16)" >> $GITHUB_OUTPUT

      - name: Cache Application (Schematron)
        id: cache-validator
        uses: actions/cache@v5
        with:
          path: ${{ env.VALIDATORPATH }}
          key: ${{ runner.os }}-${{ matrix.phpversion }}-validator-${{ steps.hash-validator.outputs.hash }}

      - name: Download Application (Schematron)
        if: steps.cache-validator.outputs.cache-hit != 'true'
        run: |
          rm -rf $VALIDATORPATH
          mkdir -p $VALIDATORPATH
          wget $VALIDATORURL -O $VALIDATORPATH/$VALIDATORZIPFILENAME
          wget $VALIDATORSCENARIOURL -O $VALIDATORPATH/$VALIDATORSCENARIOZIPFILENAME
          unzip $VALIDATORPATH/$VALIDATORZIPFILENAME -d $VALIDATORPATH
          unzip $VALIDATORPATH/$VALIDATORSCENARIOZIPFILENAME -d $VALIDATORPATH

      - name: Run Tests (Schematron)
        run: |
          set -e
          java -jar $VALIDATORPATH/$VALIDATORJARFILENAME -r $VALIDATORPATH -s $VALIDATORPATH/$VALIDATORSCENARIOFILENAME tests/assets/00_case_comfort_simple.xml
          java -jar $VALIDATORPATH/$VALIDATORJARFILENAME -r $VALIDATORPATH -s $VALIDATORPATH/$VALIDATORSCENARIOFILENAME tests/assets/00_case_comfort_simple_dto.xml
          java -jar $VALIDATORPATH/$VALIDATORJARFILENAME -r $VALIDATORPATH -s $VALIDATORPATH/$VALIDATORSCENARIOFILENAME tests/assets/00_case_xrechnung_cii_simple.xml
          java -jar $VALIDATORPATH/$VALIDATORJARFILENAME -r $VALIDATORPATH -s $VALIDATORPATH/$VALIDATORSCENARIOFILENAME tests/assets/00_case_xrechnung_cii_simple_dto.xml
          java -jar $VALIDATORPATH/$VALIDATORJARFILENAME -r $VALIDATORPATH -s $VALIDATORPATH/$VALIDATORSCENARIOFILENAME tests/assets/00_case_xrechnung_ublinvoice_simple.xml
          java -jar $VALIDATORPATH/$VALIDATORJARFILENAME -r $VALIDATORPATH -s $VALIDATORPATH/$VALIDATORSCENARIOFILENAME tests/assets/00_case_xrechnung_ublinvoice_simple_dto.xml
          java -jar $VALIDATORPATH/$VALIDATORJARFILENAME -r $VALIDATORPATH -s $VALIDATORPATH/$VALIDATORSCENARIOFILENAME tests/assets/00_case_xrechnung_ublcreditnote_simple.xml
          java -jar $VALIDATORPATH/$VALIDATORJARFILENAME -r $VALIDATORPATH -s $VALIDATORPATH/$VALIDATORSCENARIOFILENAME tests/assets/00_case_xrechnung_ublcreditnote_simple_dto.xml

      - name: Cache Key (VeraPDF)
        id: hash-verapdf
        run: |
          echo "hash=$(echo '${{ env.VERAPDFURL }}' | sha256sum | cut -c1-16)" >> $GITHUB_OUTPUT

      - name: Cache Application (VeraPDF)
        id: cache-verapdf
        uses: actions/cache@v5
        with:
          path: ${{ env.VERAPDFPATH }}
          key: ${{ runner.os }}-${{ matrix.phpversion }}-verapdf-${{ steps.hash-verapdf.outputs.hash }}

      - name: Download Application (VeraPDF)
        if: steps.cache-verapdf.outputs.cache-hit != 'true'
        run: |
          set -e
          rm -rf $VERAPDFPATH
          mkdir -p $VERAPDFPATH
          wget $VERAPDFURL -O $VERAPDFPATH/$VERAPDFZIPFILENAME
          unzip -j $VERAPDFPATH/$VERAPDFZIPFILENAME -d $VERAPDFPATH

          echo "Creating veraPDF install config"
          cat > "$VERAPDFPATH/install.xml" <<EOF
          <?xml version="1.0" encoding="UTF-8" standalone="no"?>
          <AutomatedInstallation langpack="eng">
              <com.izforge.izpack.panels.htmlhello.HTMLHelloPanel id="welcome"/>
              <com.izforge.izpack.panels.target.TargetPanel id="install_dir">
                  <installpath>$(pwd)/$VERAPDFPATH</installpath>
              </com.izforge.izpack.panels.target.TargetPanel>
              <com.izforge.izpack.panels.packs.PacksPanel id="sdk_pack_select">
                  <pack index="0" name="veraPDF Mac and *nix Scripts" selected="true"/>
                  <pack index="1" name="veraPDF Validation model" selected="true"/>
                  <pack index="2" name="veraPDF Documentation" selected="true"/>
                  <pack index="3" name="veraPDF Sample Plugins" selected="true"/>
              </com.izforge.izpack.panels.packs.PacksPanel>
              <com.izforge.izpack.panels.install.InstallPanel id="install"/>
              <com.izforge.izpack.panels.finish.FinishPanel id="finish"/>
          </AutomatedInstallation>
          EOF

          echo "Installing veraPDF"
          VERAPDFINSTALLJAR=$(find $VERAPDFPATH -type f -name "*.jar" | head -n 1); [[ -z "$VERAPDFINSTALLJAR" ]] && { echo "No veraPDF installer found" >&2; exit 1; } || echo "veraPDF installer fount at $VERAPDFINSTALLJAR"
          java -jar $VERAPDFINSTALLJAR $VERAPDFPATH/install.xml

      - name: Run Tests (VeraPDF)
        run: |
          echo "Running PDF validation (1)"
          VERAPDFRESULT=$($VERAPDFPATH/verapdf --format text --flavour 3b --loglevel 0 tests/assets/00_case_comfort_simple.pdf)
          echo "Result of validation (1)"
          echo $VERAPDFRESULT
          [[ $VERAPDFRESULT == PASS* ]] && echo "PDF validation passed" || { echo "Error: PDF validation not passed" >&2; exit 1; }
          echo "Running PDF validation (2)"
          VERAPDFRESULT=$($VERAPDFPATH/verapdf --format text --flavour 3b --loglevel 0 tests/assets/00_case_extended_simple.pdf)
          echo "Result of validation (2)"
          echo $VERAPDFRESULT
          [[ $VERAPDFRESULT == PASS* ]] && echo "PDF validation passed" || { echo "Error: PDF validation not passed" >&2; exit 1; }

      - name: Publish Unit Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "build/logs/junit.xml"
          comment_mode: ${{ github.event_name == 'pull_request' && 'failures' || 'always' }}

      - name: Publish Build Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Build log artifacts for ${{ matrix.operating-system }} PHP ${{ matrix.phpversion }}
          path: build/logs
